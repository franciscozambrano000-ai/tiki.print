<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket GMF Cafetería</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Courier New', Courier, monospace;
      width: 58mm;
      margin: 0 auto;
      padding: 2mm;
      font-size: 11px;
      color: #000;
      background: #fff;
    }

    .header {
      text-align: center;
      padding: 6px 4px;
      border-bottom: 4px solid #000;
      margin-bottom: 6px;
    }
    .sello { display: inline-block; border: 2px solid #000; padding: 3px 10px; }
    .sello-sub  { font-size: 8px; letter-spacing: 3px; }
    .sello-main { font-size: 16px; font-weight: 900; letter-spacing: 3px; line-height: 1; }

    .beneficiario-block {
      padding: 8px 6px;
      border-bottom: 2px solid #000;
      margin-bottom: 6px;
      text-align: center;
    }
    .label-small { font-size: 8px; letter-spacing: 2px; font-weight: 900; color: #555; }
    .nombre-principal { font-size: 18px; font-weight: 900; line-height: 1.1; margin-top: 2px; word-break: break-word; }
    .grado-badge {
      display: inline-block; border: 2px solid #000;
      padding: 1px 8px; margin-top: 4px;
      font-size: 12px; font-weight: 900; letter-spacing: 1px;
    }

    .body { padding: 4px 6px; }

    .dia-block { text-align: center; margin-bottom: 6px; }
    .dia-nombre { font-size: 18px; font-weight: 900; letter-spacing: 2px; }
    .dia-fecha  { font-size: 10px; font-weight: 700; color: #444; }
    .pedido-id  { font-size: 8px; color: #999; margin-top: 1px; letter-spacing: 1px; }
    .cliente-ref { font-size: 9px; color: #777; margin-top: 1px; }

    .separator-solid  { border-top: 2px solid #000; margin: 6px 0; }
    .separator-dashed { border-top: 1px dashed #000; margin: 5px 0; }
    .separator-double { border-top: 3px double #000; margin: 8px 0; }

    .section-title { font-size: 8px; font-weight: 900; letter-spacing: 2px; margin-bottom: 6px; color: #555; }
    .plato-label  { font-size: 8px; color: #777; letter-spacing: 1px; }
    .plato-nombre { font-size: 14px; font-weight: 900; line-height: 1.2; padding-left: 2px; word-break: break-word; }

    .monto-block { text-align: center; margin: 4px 0; }
    .pago-text   { font-size: 9px; color: #777; margin-bottom: 2px; }
    .monto-label { font-size: 8px; color: #777; letter-spacing: 1px; }
    .monto-valor { font-size: 28px; font-weight: 900; line-height: 1; }

    .estado-label { font-size: 8px; letter-spacing: 2px; color: #777; margin-bottom: 3px; text-align: center; }
    .estado-box {
      border: 2px solid #000; padding: 6px 4px;
      text-align: center; font-size: 11px;
      font-weight: 900; letter-spacing: 0.5px; margin-bottom: 8px;
      word-break: break-word;
    }

    .footer { border-top: 1px dashed #bbb; padding-top: 5px; text-align: center; }
    .footer-tiki { font-size: 12px; font-weight: 900; letter-spacing: 5px; }
    .footer-sub  { font-size: 7px; color: #aaa; }

    .btn-desktop { display: none; text-align: center; margin-bottom: 10px; }
    .btn-desktop button {
      font-family: 'Courier New', monospace;
      font-size: 13px; font-weight: 900;
      background: #000; color: #fff;
      border: none; padding: 10px 0;
      letter-spacing: 2px; cursor: pointer;
      width: 100%; border-radius: 6px;
    }
    .btn-mobile { display: none; text-align: center; margin-top: 12px; }
    .btn-mobile button {
      font-family: 'Courier New', monospace;
      font-size: 14px; font-weight: 900;
      background: #000; color: #fff;
      border: none; padding: 12px 0;
      letter-spacing: 2px; cursor: pointer;
      width: 100%; border-radius: 6px;
    }

    @media print {
      body { width: 58mm; margin: 0; padding: 2mm; }
      @page { size: 58mm auto; margin: 0; }
      .btn-desktop { display: none !important; }
      .btn-mobile  { display: none !important; }
    }
  </style>
</head>
<body>

  <div class="btn-desktop" id="btn-desktop">
    <button onclick="window.print()">🖨️ IMPRIMIR</button>
  </div>

  <div class="header">
    <div class="sello">
      <div class="sello-sub">GMF</div>
      <div class="sello-main">CAFETERÍA</div>
    </div>
  </div>

  <div class="beneficiario-block">
    <div class="label-small" id="etiqueta-beneficiario">CLIENTE</div>
    <div class="nombre-principal" id="nombre-principal">—</div>
    <div class="grado-badge" id="grado-badge" style="display:none"></div>
  </div>

  <div class="body">

    <div class="dia-block">
      <div class="dia-nombre" id="dia-nombre">—</div>
      <div class="dia-fecha"  id="dia-fecha">—</div>
      <div class="pedido-id"  id="pedido-id">—</div>
      <div class="cliente-ref" id="cliente-ref" style="display:none"></div>
    </div>

    <div class="separator-solid"></div>
    <div class="section-title">▸ PEDIDO</div>

    <div id="bloque-estudiantil" style="display:none">
      <div class="plato-label">MENÚ ESTUDIANTIL</div>
      <div class="plato-nombre" id="plato-estudiantil"></div>
    </div>

    <div id="bloque-ejecutivo" style="display:none">
      <div style="margin-bottom:6px; padding-left:2px">
        <div class="plato-label">ENTRADA</div>
        <div class="plato-nombre" id="plato-entrada"></div>
      </div>
      <div class="separator-dashed"></div>
      <div style="padding-left:2px">
        <div class="plato-label">SEGUNDO</div>
        <div class="plato-nombre" id="plato-segundo"></div>
      </div>
    </div>

    <div class="separator-double"></div>

    <div class="monto-block">
      <div class="pago-text" id="metodo-pago">Pago: —</div>
      <div class="monto-label">TOTAL DEL DÍA</div>
      <div class="monto-valor" id="monto">S/0.00</div>
    </div>

    <div class="separator-double"></div>

    <div class="estado-label">ESTADO</div>
    <div class="estado-box" id="estado">—</div>

    <div class="footer">
      <div class="footer-tiki">TIKI</div>
      <div class="footer-sub" id="footer-fecha">VIEW TECH</div>
    </div>

    <div class="btn-mobile" id="btn-mobile">
      <button onclick="window.print()">🖨️ ABRIR E IMPRIMIR</button>
    </div>

  </div>

<script>
  function getParam(name) {
    return decodeURIComponent(new URLSearchParams(window.location.search).get(name) || '');
  }

  var pedidoId     = getParam('pedidoId');
  var cliente      = getParam('cliente');
  var beneficiario = getParam('beneficiario');
  var grado        = getParam('grado');
  var dia          = getParam('dia');
  var fecha        = getParam('fecha');
  var estudiantil  = getParam('estudiantil');
  var entrada      = getParam('entrada');
  var segundo      = getParam('segundo');
  var monto        = getParam('monto');
  var metodoPago   = getParam('metodoPago');
  var estado       = getParam('estado');

  var tieneAlumno = beneficiario && beneficiario !== '' && beneficiario !== 'Para mí';
  if (tieneAlumno) {
    document.getElementById('etiqueta-beneficiario').textContent = 'ALUMNO';
    document.getElementById('nombre-principal').textContent = beneficiario;
    if (grado) {
      var gb = document.getElementById('grado-badge');
      gb.textContent = grado;
      gb.style.display = 'inline-block';
    }
    var cr = document.getElementById('cliente-ref');
    cr.textContent = 'Cliente: ' + cliente;
    cr.style.display = 'block';
  } else {
    document.getElementById('etiqueta-beneficiario').textContent = 'CLIENTE';
    document.getElementById('nombre-principal').textContent = cliente || '—';
  }

  var diaCapital = dia ? dia.charAt(0).toUpperCase() + dia.slice(1).toLowerCase() : '—';
  document.getElementById('dia-nombre').textContent = diaCapital.toUpperCase();
  document.getElementById('dia-fecha').textContent  = fecha || '—';
  document.getElementById('pedido-id').textContent  = pedidoId || '—';

  if (estudiantil && estudiantil.indexOf('🎓') > -1) {
    var textoEst = estudiantil.replace('🎓', '').replace(/\|.*/, '').trim();
    document.getElementById('bloque-estudiantil').style.display = 'block';
    document.getElementById('plato-estudiantil').textContent = textoEst;
  } else {
    document.getElementById('bloque-ejecutivo').style.display = 'block';
    document.getElementById('plato-entrada').textContent = entrada || '—';
    var textoSeg = estudiantil ? estudiantil.replace('🍛', '').replace('|', '').trim() : (segundo || '—');
    document.getElementById('plato-segundo').textContent = textoSeg;
  }

  document.getElementById('monto').textContent = 'S/' + (parseFloat(monto) || 0).toFixed(2);

  var metodos = { 'yape': 'Yape', 'transferencia': 'Transferencia', '': 'Efectivo en Cafetín' };
  document.getElementById('metodo-pago').textContent = 'Pago: ' + (metodos[metodoPago] || metodoPago || 'Efectivo en Cafetín');

  document.getElementById('estado').textContent = estado || '🟡 PENDIENTE';

  var ahora = new Date();
  var fechaGen = ahora.toLocaleDateString('es-PE') + ' ' + ahora.toLocaleTimeString('es-PE', {hour:'2-digit', minute:'2-digit'});
  document.getElementById('footer-fecha').textContent = 'VIEW TECH · ' + fechaGen;

  window.onload = function() {
    var esMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
    if (esMobile) {
      document.getElementById('btn-mobile').style.display = 'block';
    } else {
      document.getElementById('btn-desktop').style.display = 'block';
      setTimeout(function() { window.print(); }, 800);
    }
  };
</script>

</body>
</html>
